name: CI

on:
  push:
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Format
        run: cargo fmt --all -- --check
      - name: Test workspace
        run: cargo test --workspace

  pyqql-wheel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheel
        working-directory: crates/pyqql
        run: |
          python -m pip install --upgrade pip maturin
          maturin build --release --out dist
      - name: Import wheel in fresh venv
        working-directory: crates/pyqql
        run: |
          python -m venv /tmp/pyqql-venv
          /tmp/pyqql-venv/bin/python -m pip install dist/*.whl
          /tmp/pyqql-venv/bin/python - <<'PY'
          import pyqql
          assert pyqql.is_valid("QUERY 'hello' FROM docs LIMIT 1")
          print(pyqql.parse("QUERY 'hello' FROM docs LIMIT 1").splitlines()[0])
          PY
