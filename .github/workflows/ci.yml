name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # protoc is required by tonic-prost-build in qql-runtime's build.rs
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (core crates)
        run: cargo clippy --all-features -p qql-core -p qql-plan -p qql-embed -p qql -p qql-cli -- -D warnings

      - name: Test (core crates)
        run: cargo test --all-features -p qql-core -p qql-plan -p qql-embed -p qql -p qql-cli

  # ─────────────────────────────────────────────────────────────
  #  Platform bindings — skipped until publishing paths are ready
  # ─────────────────────────────────────────────────────────────

  # pyqql: needs Python 3.12 + maturin + protoc
  # nqql:   needs Node.js + napi-rs
  # wasm:   needs wasm32-unknown-unknown target + wasm-pack

