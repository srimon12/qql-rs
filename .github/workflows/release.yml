name: Release

# Trigger: push a version tag (v0.1.0, v0.2.0-alpha, etc.)
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — build only, skip publish"
        type: boolean
        default: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # ═══════════════════════════════════════════════════════════════
  #  Gate: CI checks must pass before any publish
  # ═══════════════════════════════════════════════════════════════
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (library + CLI)
        run: cargo clippy --all-features -p qql-core -p qql-plan -p qql-embed -p qql -p qql-cli -- -D warnings

      - name: Test (library + CLI)
        run: cargo test --all-features -p qql-core -p qql-plan -p qql-embed -p qql -p qql-cli

  # ═══════════════════════════════════════════════════════════════
  #  crates.io — publish library crates + CLI
  #
  #  Dependency order:
  #    qql-core → qql-plan → qql-embed → qql → qql-cli
  #
  #  Users only need ONE dep:
  #    [dependencies]
  #    qql = "0.1"
  #
  #  qql re-exports qql-core/qql-plan/qql-embed types as pub mods.
  #  Internal crates are published only so qql can resolve them.
  # ═══════════════════════════════════════════════════════════════
  publish-crates-io:
    needs: gate
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || !inputs.dry_run }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      # --- internal deps (published for resolution, not direct use) ---

      - name: Publish qql-core (internal)
        run: cargo publish -p qql-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

      - name: Publish qql-plan (internal)
        run: cargo publish -p qql-plan
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

      - name: Publish qql-embed (internal)
        run: cargo publish -p qql-embed
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

      # --- user-facing crate ---

      - name: Publish qql (umbrella — re-exports everything)
        run: cargo publish -p qql
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

      # --- CLI binary (5-7 MB binary is normal for Rust CLIs) ---

      - name: Publish qql-cli
        run: cargo publish -p qql-cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

  # ═══════════════════════════════════════════════════════════════
  #  GitHub Release — pre-built binaries for edge + CLI
  #
  #  qql-edge (55 MB) is too heavy for crates.io / cargo install.
  #  Distribute as pre-compiled binaries instead.
  # ═══════════════════════════════════════════════════════════════
  build-binaries:
    needs: gate
    runs-on: ${{ matrix.os }}
    if: ${{ github.event_name == 'push' }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: qql
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: qql
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: qql
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: qql.exe
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install protoc (Linux only)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Build qql-cli (release)
        run: |
          cargo build --release -p qql-cli --target ${{ matrix.target }}

      - name: Build qql-edge (release)
        run: |
          cargo build --release -p qql-edge --target ${{ matrix.target }}

      - name: Upload binaries
        uses: actions/upload-artifact@v5
        with:
          name: binaries-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/qql${{ runner.os == 'Windows' && '.exe' || '' }}
            target/${{ matrix.target }}/release/qql-edge${{ runner.os == 'Windows' && '.exe' || '' }}

  github-release:
    needs: [publish-crates-io, build-binaries]
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download all binaries
        uses: actions/download-artifact@v5
        with:
          pattern: binaries-*
          path: dist

      - name: Rename binaries for release
        run: |
          mkdir -p release-artifacts
          for dir in dist/binaries-*; do
            target=$(basename "$dir" | sed 's/^binaries-//')
            for f in "$dir"/*; do
              name=$(basename "$f")
              base="${name%.*}"
              ext="${name##*.}"
              if [ "$ext" = "exe" ]; then
                cp "$f" "release-artifacts/${base}-${target}.exe"
              else
                cp "$f" "release-artifacts/${base}-${target}"
              fi
            done
          done

      - name: Generate changelog
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            {
              echo "## Commits"
              git log --oneline --no-merges
            } > /tmp/changelog.md
          else
            {
              echo "## Changes since $LAST_TAG"
              echo ""
              git log --oneline --no-merges "$LAST_TAG..HEAD"
            } > /tmp/changelog.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: /tmp/changelog.md
          files: release-artifacts/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}

  # ═══════════════════════════════════════════════════════════════
  #  Future: Python wheel → PyPI
  # ═══════════════════════════════════════════════════════════════
