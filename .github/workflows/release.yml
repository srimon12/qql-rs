  #     - uses: actions/setup-python@v5
  #       with: { python-version: "3.12" }
  #     - run: sudo apt-get install -y protobuf-compiler
  #     - run: pip install maturin
  #     - name: Build & publish
  #       working-directory: crates/pyqql
  #       env:
  #         MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
  #       run: maturin publish

