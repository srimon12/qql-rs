[package]
name = "qql-cli"
version.workspace = true
edition.workspace = true

[[bin]]
name = "qql"
path = "src/main.rs"

[dependencies]
qql-core = { path = "../qql-core" }
clap = { version = "4", features = ["derive"] }
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
rustyline = "14"
async-trait = "0.1"
mimalloc = "0.1"
