[package]
name = "qql-cli"
version.workspace = true
edition.workspace = true

[[bin]]
name = "qql"
path = "src/main.rs"

[dependencies]
qql-core = { path = "../qql-core" }
qql = { path = "../qql-runtime" }
clap = { version = "4", features = ["derive"] }
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
rustyline = "14"
mimalloc = "0.1"
